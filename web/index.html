function nowStamp(){const n=new Date();return n.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+
  n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+' GST';}
/* djb2 string hash — synchronous, dependency-free; used to give the audit log a
   tamper-evident chain in the prototype. Production hook: server-side WORM store. */
function _h(str){ let h=5381; for(let i=0;i<str.length;i++){ h=((h<<5)+h)^str.charCodeAt(i); } return (h>>>0).toString(16).padStart(8,'0'); }
function logAudit(action,detail,cls){
  const actor=(SESSION&&SESSION.name)||'Fatma Almulla';
  const prev=AUDIT[0]?AUDIT[0].hash:'genesis';
  const ts=nowStamp(); const seq=(AUDIT[0]?AUDIT[0].seq:0)+1;
  const hash=_h(prev+'|'+ts+'|'+actor+'|'+action+'|'+(detail||'')+'|'+(cls||'OFFICIAL'));
  AUDIT.unshift({ts,actor,action,detail,cls:cls||'OFFICIAL',seq,prevHash:prev,hash});
  STORE.save();
}
/* verifyAuditChain(): recompute the hash chain to detect tampering. */
function verifyAuditChain(){
  const arr=[...AUDIT].reverse(); let prev='genesis', ok=true, broken=null;
  for(const e of arr){
    if(e.prevHash!==prev){ ok=false; broken=e.seq; break; }
    const h=_h(prev+'|'+e.ts+'|'+e.actor+'|'+e.action+'|'+(e.detail||'')+'|'+(e.cls||'OFFICIAL'));
    if(h!==e.hash){ ok=false; broken=e.seq; break; }
    prev=e.hash;
  }
  return {ok,broken,count:AUDIT.length};
}
/* exportAuditLog(): downloads the hash-chained audit trail as a signed .txt (prototype). */
function exportAuditLog(){
  const v=verifyAuditChain();
  const head=(S.lang==='ar'
    ? 'دانة — سجل التدقيق الموقّع (نموذج تجريبي)\nالحالة: '+(v.ok?'سلامة السلسلة مؤكَّدة':'تم اكتشاف عبث')+' · عدد الأحداث: '+v.count+'\n'
    : 'DANAH — SIGNED AUDIT LOG (prototype)\nIntegrity: '+(v.ok?'chain verified':'TAMPER DETECTED')+' · events: '+v.count+'\n')
    +'============================================================\n';
  const body=[...AUDIT].map(e=>`#${e.seq} ${e.ts} | ${e.actor} | ${e.action} | ${e.detail||''} | ${e.cls} | hash:${e.hash} prev:${e.prevHash}`).join('\n');
  const txt=head+body+'\n============================================================\n'+(S.lang==='ar'?'نهاية السجل · بيانات تجريبية':'End of log · synthetic data');
  try{ const blob=new Blob([txt],{type:'text/plain'}); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='DANAH_audit_'+new Date().toISOString().slice(0,10)+'.txt';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }catch(e){}
  logAudit('Exported audit log', v.count+' events · '+(v.ok?'verified':'unverified'),'OFFICIAL');
  toast('Signed audit log exported');
}

let PAL={open:false,items:[],sel:0,q:''};
function buildPalette(){
  const items=[];
  NAV.forEach(n=>{ if(!n.divider) items.push({t:tt('nav.'+n.id,n.label),s:tx('Go to page'),ic:n.icon,go:()=>go(n.id)}); });
  items.push({t:tt('nav.governance','Governance & Audit'),s:tx('Go to page'),ic:'shield',go:()=>go('governance')});
  MIN.forEach(m=>items.push({t:tx(m.name),s:tx('Filter to ministry'),ic:m.icon,go:()=>{S.ministry=m.id;go('home');}}));
  DECISIONS.forEach(d=>items.push({t:tx(d.title),s:tx('Open Decision Card')+' · '+tx('score')+' '+d.score,ic:'zap',go:()=>{closePalette();openDecision(d.id);}}));
  ['What emerging risks threaten Vision 2031?','Which opportunities require immediate investment?',
   'What should the Minister of Economy focus on today?'].forEach(q=>
    items.push({t:tx(q),s:tx('Ask DANAH'),ic:'spark',go:()=>{closePalette();askDanah(q);}}));
  PAL.items=items;
}
function openPalette(){ buildPalette(); PAL.open=true; PAL.q=''; PAL.sel=0;
  const root=$('#palette-root');
  root.innerHTML=`<div class="scrim pal-scrim" onclick="if(event.target===this)closePalette()">
    <div class="palette" role="dialog" aria-label="Command palette">
      <div class="pal-in">${ic('search',18)}<input id="palInput" class="pal-input" placeholder="${tt('palette.placeholder','Search a page, ministry, decision — or ask DANAH…')}" aria-label="Search commands"
        oninput="palFilter(this.value)" onkeydown="palKey(event)"><kbd class="pal-esc">esc</kbd></div>
      <div class="pal-list" id="palList"></div>
    </div></div>`;
  palRender(); setTimeout(()=>{const pi=$('#palInput');if(pi)pi.focus();},20);
}
function closePalette(){ PAL.open=false; const r=$('#palette-root'); if(r)r.innerHTML=''; }
function palFilter(v){ PAL.q=v.toLowerCase(); PAL.sel=0; palRender(); }
function palMatches(){ if(!PAL.q)return PAL.items.slice(0,8);
  return PAL.items.filter(i=>(i.t+' '+i.s).toLowerCase().includes(PAL.q)).slice(0,8); }
function palRender(){ const list=$('#palList'); if(!list)return; const ms=palMatches();
  list.innerHTML = ms.length? ms.map((i,n)=>`<div class="pal-item ${n===PAL.sel?'sel':''}" onclick="palGo(${n})" onmousemove="palHover(${n})">
      <span class="pal-ic">${ic(i.ic,16)}</span><span class="pal-t">${i.t}</span><span class="pal-s">${i.s}</span></div>`).join('')
    : `<div class="pal-empty">No matches</div>`;
}
function palHover(n){ PAL.sel=n; palRender(); }
function palGo(n){ const ms=palMatches(); if(ms[n]){closePalette();ms[n].go();} }
function palKey(e){ const ms=palMatches();
  if(e.key==='ArrowDown'){e.preventDefault();PAL.sel=Math.min(PAL.sel+1,ms.length-1);palRender();}
  else if(e.key==='ArrowUp'){e.preventDefault();PAL.sel=Math.max(PAL.sel-1,0);palRender();}
  else if(e.key==='Enter'){e.preventDefault();palGo(PAL.sel);}
  else if(e.key==='Escape'){e.preventDefault();closePalette();} }

/* tx(s): localize a single English UI/data string. */
function tx(s){ if(s==null) return s; if(typeof s==='object'){ if('en' in s||'ar' in s) return (S.lang==='ar'&&s.ar)||s.en||''; return s; } return S.lang==='ar' ? (AR[s]||s) : s; }
/* tr(key, fallback): key-based lookup (chrome). Falls back to English then key. */
function tr(key,fallback){ const ar=LANG.ar[key]; if(S.lang==='ar'&&ar) return ar; return (LANG.en[key]||fallback||key); }
/* tt kept as alias of tr for existing call sites. */
function tt(k,en){ return tr(k,en); }
/* localize({en,ar}|{x_en,x_ar}|string) */
function localize(v){ if(v==null) return v; if(typeof v==='string') return tx(v);
  if(typeof v==='object'){ if('ar' in v||'en' in v) return (S.lang==='ar'&&v.ar)||v.en||''; } return v; }

/* auditArabicCoverage(): dev QA — scans visible DOM for likely-untranslated English while in Arabic mode. */
function auditArabicCoverage(){
  if(S.lang!=='ar'){ console.warn('[QA] Switch to Arabic first: setLang("ar")'); return; }
  /* allow-list: brand, acronyms, IDs, language names, and dynamic time/date/number strings */
  const allow=/^(DANAH|دانة|AI|API|KPI|GST|UAE|DEC|ACT|INS|REP|MEM|ALR|EVT|HTML|txt|FA|Ctrl|Cmd|⌘|A4|RTL|TMS|SSO|RBAC|HMAC|IdP|mTLS|IMF|OECD|POST|GET|PUT|DELETE|LiveAgent|IntelligenceEngine|SourceRegistry|WebhookQueue|Dashboards|Reports|Decisions|Opportunities|Risks|Success|Actions|Policy|MoE|MoEd|MoHAP|MoCCAE|MoIAT|EN|ع|English|العربية|continuous|Operational|\d|[•·–—-]+)$/;
  const timey=/\d+\s*(min|h|hr|hours?|d|days?)\s+ago|GST|\d{4}-\d{2}-\d{2}|\b\d{1,2}:\d{2}\b|\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b|approve\s*·|just now|^\/api\/|^[a-z][a-z_]+$|^EVT-|^CFL-|^sha256|^doc:\/\/|payload$|^\{|^\d{3}(\/\d{3})*$/i;
  const latin=/[A-Za-z]{3,}/; const hits=[];
  document.querySelectorAll('#content, .sidebar, .topbar, .modal, .palette').forEach(root=>{
    root.querySelectorAll('*').forEach(el=>{
      if(el.children.length) return; const txt=(el.textContent||'').trim();
      if(!txt||txt.length<2) return; if(allow.test(txt)||timey.test(txt)) return;
      if(latin.test(txt) && !/[\u0600-\u06FF]/.test(txt)) hits.push(txt.slice(0,60));
    });
  });
  const uniq=[...new Set(hits)];
  console.log('[QA] auditArabicCoverage —',uniq.length,'possible untranslated string(s):');
  uniq.forEach(h=>console.log('   • '+h));
  return uniq;
}

function sparkline(series,color,w,h){ w=w||96;h=h||26; const mx=Math.max(...series),mn=Math.min(...series),rg=(mx-mn)||1;
  const pts=series.map((v,i)=>`${(i/(series.length-1)*w).toFixed(1)},${(h-2-((v-mn)/rg)*(h-4)).toFixed(1)}`).join(' ');
  const last=series[series.length-1],lx=w,ly=(h-2-((last-mn)/rg)*(h-4));
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="spark" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.4" fill="${color}"/></svg>`;
}
const HEAT_THEMES=['Growth','Risk','Innovation','Resilience','Talent'];
const HEAT=MIN.map(m=>({m, vals:HEAT_THEMES.map((th,j)=>{ // synthetic intensities 0..100
  const base=[72,58,64,55,48][MIN.indexOf(m)]; return Math.max(8,Math.min(96, base + ((j*17+MIN.indexOf(m)*23)%40) - 18)); })}));
function heatColor(v){ // 0 (low/calm, green) -> 100 (hot, red)
  const stops=[[21,160,90],[245,180,40],[224,69,58]]; const x=v/100;
  const c=x<.5?mix(stops[0],stops[1],x/.5):mix(stops[1],stops[2],(x-.5)/.5);
  return `rgb(${c[0]},${c[1]},${c[2]})`; }
function mix(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
function heatMap(){
  return `<div class="heat">
    <div class="heat-grid" style="grid-template-columns:140px repeat(${HEAT_THEMES.length},1fr)">
      <div class="heat-corner"></div>
      ${HEAT_THEMES.map(th=>`<div class="heat-col">${tx(th)}</div>`).join('')}
      ${HEAT.map(row=>`<div class="heat-row">${ic(row.m.icon,15)} ${mShort(row.m.id)}</div>
        ${row.vals.map(v=>`<div class="heat-cell" style="background:${heatColor(v)}" title="${mShort(row.m.id)} · ${tx(HEAT_THEMES[row.vals.indexOf(v)])}: ${v}">${v}</div>`).join('')}`).join('')}
    </div>
    <div class="heat-legend"><span>${tx('Calm')}</span><i class="heat-bar"></i><span>${tx('Hot')}</span>
      <span class="muted" style="margin-left:auto">${synthTag()}</span></div>
  </div>`;
}

/* simulated orchestration run */
function runPipeline(){
  if(S.route!=='agents'){ go('agents'); setTimeout(runPipeline,420); return; }
  const con=$('#console'); if(!con)return; con.innerHTML='';
  const steps=document.querySelectorAll('.step');
  steps.forEach(s=>s.classList.remove('done','active'));
  AGENTS.forEach(a=>a.status='idle'); renderAgentsLive();
  const seq=[
    ['ok','collect','Data Collection','Ingested 142 items — 38 ministry feeds, 64 reports, 27 news, 13 documents.'],
    ['ok','validate','Source Validation','Scored credibility & freshness; 11 duplicates removed; 131 items passed.'],
    ['info','analyze','Strategic Analysis','Classified items by type, sector and ministry impact.'],
    ['info','analyze','Strategic Analysis','Extracted entities: 5 ministries, 18 sectors, 46 strategic themes.'],
    ['warn','risk','Risk Detection','Flagged 2 critical risks: water security ↑, specialist-talent shortfall ↑.'],
    ['ok','oppty','Opportunity Discovery','Surfaced 5 opportunities; advanced-manufacturing signal reinforced ×3.'],
    ['ok','success','Success Story','Detected 5 UAE wins — including a breakthrough industrial patent.'],
    ['info','watch','Policy Watch','Tracked 5 policy signals; foreign-ownership revision flagged imminent.'],
    ['info','prioritize','Prioritisation','Ranked 21 insights by importance, urgency, confidence & feasibility.'],
    ['ok','recommend','Recommendation','Generated 4 priority recommendations with owners & next steps.'],
    ['ok','brief','Briefing','Composed daily executive brief + 5 ministry briefs.'],
    ['info','track','Action Tracker','Created / updated 25 action items; 5 awaiting decision.'],
    ['ok','memorize','Strategic Memory','Stored 6 entries; detected recurring advanced-manufacturing pattern.'],
    ['warn','notify','Notification','Raised 3 leadership alerts — 2 critical, 1 high.']
  ];
  let i=0;
  const t=setInterval(()=>{
    if(i>=seq.length){clearInterval(t);
      AGENTS.forEach(a=>a.status='done'); renderAgentsLive();
      log(con,'ok','SYSTEM','Cycle complete in 3.1s — daily brief ready.');
      toast('Intelligence pipeline complete — daily brief refreshed');return;}
    const [tone,aid,stage,msg]=seq[i];
    const ag=AGENTS.find(a=>a.id===aid); if(ag){ag.status='run';renderAgentsLive();}
    const stepIdx=Math.min(i,steps.length-1);
    steps.forEach((s,n)=>{s.classList.remove('active');if(n<stepIdx)s.classList.add('done');});
    if(steps[stepIdx])steps[stepIdx].classList.add('active');
    log(con,tone,stage,msg);
    if(ag)setTimeout(()=>{ag.status='done';renderAgentsLive();},260);
    i++;
  },420);
}
function log(con,tone,stage,msg){
  const time=new Date().toLocaleTimeString('en-GB',{hour12:false});
  con.appendChild(el(`<div class="cl ${tone}"><span class="ct">${time}</span><span class="cstage">${stage}</span><span class="cmsg">${msg}</span></div>`));
  con.scrollTop=con.scrollHeight;
}
function renderAgentsLive(){ const wrap=document.querySelectorAll('.agent-card');
  if(!wrap.length)return; wrap.forEach((c,n)=>{const a=AGENTS[n];const dot=c.querySelector('.sdot');
    if(dot){dot.className='sdot '+a.status;c.querySelector('.agent-stat').childNodes[1].textContent=
      a.status==='done'?'Ready':a.status==='run'?'Running':'Idle';}}); }

function actionCard(a){
  const ST=STAT[a.status];const next={decision:'progress',progress:'done',done:'decision'};
  return `<div class="card card-pad" style="cursor:default">
    <div style="display:flex;gap:9px;align-items:flex-start;margin-bottom:10px">

function advance(id){const a=ACTIONS.find(x=>x.id===id);if(!a)return;

/* report preview + download */
function reportContent(id){
  const ar=S.lang==='ar';
  const stamp=new Date().toLocaleString(ar?'ar-AE':'en-GB',{dateStyle:'full',timeStyle:'short'});
  const head=ar
    ? `دانة — منصة الذكاء الإستراتيجي
حكومة دولة الإمارات · محللة إستراتيجية: فاطمة الملا
أُنشئ في: ${stamp} بتوقيت الخليج
ملاحظة: يحتوي هذا التقرير على بيانات تجريبية لأغراض العرض فقط.
============================================================\n`
    : `DANAH — STRATEGIC INTELLIGENCE PLATFORM
UAE Government · Strategic Analyst: Fatma Almulla
Generated: ${stamp} GST
NOTE: This report contains SYNTHETIC, demonstration-only data.
============================================================\n`;
  const sec=(t)=>`\n${t}\n${'-'.repeat(Math.max(8,t.length))}\n`;
  const U=ar?'الأولوية':'Urgency', IM=ar?'الأثر':'Impact', CO=ar?'الثقة':'Confidence', MI=ar?'الوزارة':'Ministry',
        OW=ar?'الجهة المالكة':'Owner', DU=ar?'الاستحقاق':'Due', PR=ar?'الإنجاز':'Progress', MT=ar?'إجراء التخفيف':'Mitigation';
  let body='';
  if(id.startsWith('ministry-')){const mid=id.split('-')[1];const m=minObj(mid);
    body+=sec((ar?'موجز وزارة — ':'MINISTRY BRIEF — ')+(ar?mName(mid):m.name.toUpperCase()));
    body+=briefSummary(mid)+'\n';
    INSIGHTS.filter(i=>i.ministry===mid).forEach(i=>{
      body+=`\n[${tx(TYPE[i.type].label)}] ${insT(i)}\n  ${insS(i)}\n  ${U}: ${tx(URG[i.urgency].l)} | ${IM}: ${tx(i.impact)} | ${CO}: ${pct(i.confidence)}\n`;
      i.recommendedActions.forEach(a=>body+=`   • ${tx(a)}\n`);});
  } else if(id==='national'){
    body+=sec(ar?'الموجز الوطني اليومي للذكاء':'DAILY NATIONAL INTELLIGENCE BRIEF');
    body+=`${ar?'مجال التركيز هذا الأسبوع':'Focus area this week'}: ${tx(FOCUS.title)}\n${tx(FOCUS.summary)}\n`;
    ['opportunity','risk','success','policy'].forEach(t=>{
      body+=sec(ar?tx(TYPE[t].label):TYPE[t].label.toUpperCase()+'S');
      byType(t).forEach(i=>body+=`• [${mShort(i.ministry)}] ${insT(i)} (${tx(URG[i.urgency].l)}, ${pct(i.confidence)})\n   ${insS(i)}\n`);});
  } else if(id==='risk'){
    body+=sec(ar?'تقرير المخاطر ونقاط العمى الوطنية':'NATIONAL RISK & BLIND-SPOT REPORT');
    byType('risk').sort((a,b)=>score(b)-score(a)).forEach(i=>{
      body+=`\n• [${mShort(i.ministry)}] ${insT(i)}  (${tx(URG[i.urgency].l)})\n   ${insS(i)}\n`;
      i.recommendedActions.forEach(a=>body+=`     – ${MT}: ${tx(a)}\n`);});
  } else if(id==='actions'){
    body+=sec(ar?'سجل الإجراءات والقرارات':'ACTION & DECISION REGISTER');
    ['decision','progress','done'].forEach(s=>{body+=sec(tx(STAT[s].l));
      ACTIONS.filter(a=>a.status===s).forEach(a=>body+=`• ${tx(a.title)}\n   ${MI}: ${mShort(a.ministry)} | ${OW}: ${tx(a.owner)} | ${DU}: ${a.due} | ${PR}: ${a.progress}%\n`);});
  } else if(id==='ministry'){
    body+=sec(ar?'حزمة موجزات الوزارات':'MINISTRY BRIEF PACK');
    MIN.forEach(m=>{body+=sec(ar?mName(m.id):m.name.toUpperCase());body+=briefSummary(m.id)+'\n';});
  } else { body+=sec(ar?'ملخص':'SUMMARY'); byType(id).forEach(i=>body+=`• ${insT(i)}\n`);}
  const foot=ar?'\n============================================================\nنهاية التقرير · منصة دانة للذكاء الإستراتيجي\n'
                :'\n============================================================\nEnd of report · DANAH Strategic Intelligence Platform\n';
  return head+body+foot;
}

  const title=id.startsWith('ministry-')?mName(id.split('-')[1])+(S.lang==='ar'?' — موجز':' — Brief'):tx(titleMap[id]||'Intelligence Report');

function downloadReport(id){
  const txt=reportContent(id);
  const blob=new Blob([txt],{type:'text/plain'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`DANAH_${id}_${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast('Report downloaded');
}

function askDanah(q){
  const ql=q.toLowerCase(); let res;
  if(/econom/.test(ql)) res=ansEconomy();
  else if(/polic|regulat|cabinet/.test(ql)) res=ansPolicy();
  else if(/2031|emerging risk|threat|risk/.test(ql)) res=ansRisks2031();
  else if(/opportunit|invest/.test(ql)) res=ansOpportunities();
  else if(/brief|tomorrow|prepare|meeting|summary/.test(ql)) res=ansBriefing();
  else res=ansGeneric(q);
  openCopilot(q,res);
}

function agentReply(p,q){
  const ql=q.toLowerCase();
  const caps=()=>`Here's where I can help:<ul class="ch-list">${p.capabilities.map(c=>`<li>${c}</li>`).join('')}</ul>Ask me anything, or use a quick action below.`;
  if(/explain|what does this|what is this|what are you|before i (use|run|decide)|how do you work|what do you do/.test(ql)) return p.explain+`<div class="ch-soft">Tip: ask me "What would you recommend?" once you're ready.</div>`;
  if(/what can you|help me with|capabilit|what are you able|what can i ask/.test(ql)) return caps();
  if(/best way|how (do|to|can|should) i|how to|approach|tackle|solve|where do i start|get started/.test(ql)) return p.approach;
  if(/recommend|suggest|what would you|based on my|should i|advice|what do you think|priorit/.test(ql)) return p.recommend();
  if(/next step|what next|what now|then what|after that|what should i do/.test(ql)) return p.next+`<div class="ch-soft">${ic('zap',12)} The quick actions below will run it for you.</div>`;
  if(/thank|thanks|great|perfect|got it|okay|^ok\b/.test(ql)) return `Happy to help. When you're ready, use a quick action below — or keep asking. I advise; you decide.`;
  return `Good question. ${p.recommend()}<div class="ch-soft">You can also ask me what I can help with, the best way to approach it, or for a recommendation.</div>`;
}

/* ---- seal seed audit entries into the hash chain on first load ---- */
function sealAuditSeed(){
  // chronological (oldest first) = reverse of the unshift-ordered AUDIT
  const arr=[...AUDIT].reverse(); let prev='genesis', seq=0; const sealed=[];
  for(const e of arr){
    if(e.hash){ prev=e.hash; seq=e.seq||seq+1; sealed.push(e); continue; }
    seq+=1; const ts=e.ts, actor=e.actor, action=e.action, detail=e.detail||'', cls=e.cls||'OFFICIAL';
    const hash=_h(prev+'|'+ts+'|'+actor+'|'+action+'|'+detail+'|'+cls);
    sealed.push(Object.assign(e,{seq,prevHash:prev,hash})); prev=hash;
  }
  AUDIT.length=0; sealed.reverse().forEach(e=>AUDIT.push(e));
}

/* ====================  WEBHOOK SECURITY (simulated)  ================== */
/* In production these run SERVER-SIDE in the webhook receiver/validation
   service — never trusted from the browser.                                   */
function verifyWebhookSignature(event){ return { ok: !!event.signature, label:'HMAC signature' }; }
function validateWebhookPayload(event){
  const need=['event_id','event_type','source_name','title','summary','classification'];
  const ok=need.every(k=>event[k]!=null && event[k]!=='');
  return { ok, label:'Schema validation' };
}
function checkSourceAllowlist(event){
  const src=SOURCE_REGISTRY.find(s=>s.name===event.source_name);
  return { ok: !!src && src.official_status!=='unverified', label:'Source allowlist' };
}
function deduplicateWebhookEvent(event){
  const dup=DanahIntelligenceEngine.processedSignalLog.some(e=>e.event_id===event.event_id);
  return { ok: !dup, label:'Deduplication' };
}
function classifyWebhookEvent(event){ event.classification=classifySignal(event); return { ok:true, label:'Classification', value:event.classification }; }
function requiresHumanReview(event){
  const need = event.requires_human_review || event.credibility_score<0.75 || event.classification==='CABINET CONFIDENTIAL';
  return { ok:!need, need, label:'Human-review gate' };
}
function runWebhookSecurity(event){
  const checks=[ verifyWebhookSignature(event), validateWebhookPayload(event), checkSourceAllowlist(event),
    deduplicateWebhookEvent(event), classifyWebhookEvent(event), {ok:true,label:'Timestamp / replay window'},
    {ok:true,label:'Rate limit'}, {ok:true,label:'Checksum'} ];
  const hr=requiresHumanReview(event);
  const passed=checks.every(c=>c.ok);
  return { checks, hr, passed };
}

/* simulateWebhookEvent(type): the headline demo — generate → secure → process → mutate UI → alert → regenerate → audit */
function simulateWebhookEvent(type){
  type = type || WEBHOOK_TYPES[Math.floor(Math.random()*WEBHOOK_TYPES.length)];
  const ev=makeWebhookEvent(type);
  DanahIntelligenceEngine.counters.webhookEvents++; DanahIntelligenceEngine.counters.signalsReceived++;
  DanahIntelligenceEngine.webhookQueue.push(ev);
  logAutomationEvent({trigger:'webhook', action:'Webhook event received', source:ev.source_name, eventId:ev.event_id, object:ev.event_type, conf:ev.credibility_score, result:'queued'});
  const sec=runWebhookSecurity(ev);
  if(!sec.passed){
    DanahIntelligenceEngine.counters.failedUpdates++; DanahIntelligenceEngine.retryQueue.push(ev);
    const failed=sec.checks.find(c=>!c.ok);
    logAutomationEvent({trigger:'webhook', action:'Webhook event failed validation', source:ev.source_name, eventId:ev.event_id, object:ev.event_type, result:'failed', error:(failed&&failed.label)||'validation'});

  // passed security → process

function getRelevantDataForQuery(q){
  q=(q||'').toLowerCase();
  const top=(t,n)=>byType(t).slice().sort((a,b)=>score(b)-score(a)).slice(0,n);
  if(/overdue|late|slipping|behind/.test(q)) return {kind:'overdue'};
  if(/audit|log of actions|trail/.test(q)) return {kind:'audit'};
  if(/health|engine status|is the engine|automation status|running/.test(q)) return {kind:'health'};
  if(/draft|create an action|new action|log an action/.test(q)) return {kind:'draft'};
  if(/conflict|disagree|contradict/.test(q)) return {kind:'conflict'};
  if(/risk|threat|blind/.test(q)) return {kind:'risk', items:top('risk',3)};
  if(/oppor|invest|growth/.test(q)) return {kind:'opportunity', items:top('opportunity',3)};
  if(/policy|regulat|mandate/.test(q)) return {kind:'policy', items:top('policy',3)};
  if(/action|task|pending/.test(q)) return {kind:'action'};
  if(/decision|approve|outcome/.test(q)) return {kind:'decision'};
  if(/report|brief|download/.test(q)) return {kind:'report'};
  if(/chang|new|update|automation/.test(q)) return {kind:'change'};
  if(/source|verif|fresh|credib|confidence/.test(q)) return {kind:'source'};
  if(/help|how|use|navigate/.test(q)) return {kind:'help'};
  return {kind:'page'};
}

function sendLiveAgentMessage(){
  const i=$('#laInput'); if(!i)return; const q=(i.value||'').trim(); if(!q)return;
  if(LA.typingTimer){ clearTimeout(LA.typingTimer); LA.typingTimer=null; } /* no stacked timers */
  addAgentMessage('user',q); i.value=''; i.focus();
  LA.abortRequested=false; LA.busy=true; LA._typing=true; paintBusy(); paintMessages();
  logAutomationEvent({trigger:'agent', action:'Live Agent asked', object:'LiveAgent', result:'ok'});
  if(typeof logAudit==='function') logAudit('Live Agent question asked', q.slice(0,80)+' \u00b7 as '+roleObj().name,'OFFICIAL');
  LA.typingTimer=setTimeout(()=>{ LA.typingTimer=null;
    if(LA.abortRequested){ LA._typing=false; LA.busy=false; paintBusy(); paintMessages(); return; }
    LA._typing=false; LA.busy=false; let r; try{ r=generateLiveAgentResponse(q); }catch(e){ r={text:tx('Sorry \u2014 I hit an error preparing that. Try rephrasing, or use a shortcut below.')}; }
    addAgentMessage('agent', r.text, r.actions); LA.lastResponseAt=Date.now();
    paintBusy(); paintMessages(); const inp=$('#laInput'); if(inp) inp.focus();
  }, 260);
}
function laQuick(id){ // shortcut chips map to a synthetic user turn
  const map={ 'ctx:summary':tx('Summarize this page'), 'ctx:attention':tx('What needs my attention'), 'ctx:changed':tx('What changed') };

function executeAgentAction(actionId){
  logAutomationEvent({trigger:'agent', action:'Live Agent action triggered', object:actionId, result:'ok'});
  if(actionId.indexOf('go:')===0){ go(actionId.slice(3)); }
  else if(actionId.indexOf('report:')===0){ openReport(actionId.slice(7)); }
  else if(actionId.indexOf('decision:')===0){ const id=actionId.slice(9); openDecision(id==='top'?(DECISIONS[0]?DECISIONS[0].id:''):id); }
  else if(actionId==='refresh'){ runRefreshNow(); addAgentMessage('agent', tx('Done — refreshed sources and regenerated the dashboards.'), [{id:'go:automation',label:tx('Open Automation Log')}]); }
  else if(actionId==='webhook'){ const ev=simulateWebhookEvent(); addAgentMessage('agent', tx('Simulated a verified webhook event:')+' '+ev.title, [{id:'go:webhooks',label:tx('Open Webhook Control Centre')}]); }
  else if(actionId==='conflict'){ const c=simulateSourceConflict(); addAgentMessage('agent', tx('Flagged a source conflict for human verification:')+' '+tx(c.topic), [{id:'go:webhooks',label:tx('Review')}]); }
  else if(actionId==='draftaction'){ const d=DECISIONS[0]; const title=d?('Draft: '+tx(d.title)):'Draft action for review';
    ACTIONS.unshift({id:'ACT-DRAFT-'+Date.now(), title:title, ministry:d?d.ministry:'economy', status:'decision', urgency:'high', owner:(SESSION&&SESSION.name)||'Fatma Almulla', due:'TBD', progress:5, note:'Draft prepared by Live Agent — awaiting human review', _fresh:freshStamp()});
    logAutomationEvent({trigger:'agent', action:'Live Agent action triggered', object:'Draft action', humanReview:true, result:'awaiting approval'});
    if(typeof logAudit==='function') logAudit('Live Agent drafted action', title+' — awaiting human review','OFFICIAL');
    addAgentMessage('agent', tx('I prepared a draft action and added it to the Action Tracker under “Awaiting Decision”. It will not progress until you approve it.'), [{id:'go:actions',label:tx('Open Action Tracker')}]);
    toast(tx('Draft action prepared — awaiting your approval')); }
  else if(actionId==='lang'){ toggleLang(); }
  else if(actionId==='brief'){ go('a4'); }
  renderLiveAgent();
}

function laFmt(t){ return laEsc(t).replace(/\n/g,'<br>'); }
function laSummary(t){ const first=(t==null?'':String(t)).split('\n')[0].trim(); if(first.length<=150) return first; return first.slice(0,140).replace(/\s+\S*$/,'')+'\u2026'; }

/* ---- verification scoring (0–100) + tier bands ---- */
function computeVerificationScore(o){
  o=o||{}; const tierBoost={1:40,2:36,3:28,4:20,5:8}[o.tier||3]; let s=tierBoost;
  s+=Math.round((o.credibility_score!=null?o.credibility_score:0.8)*30);
  s+=Math.round((o.freshness_score!=null?o.freshness_score:0.8)*18);
  if(o.official_status==='official') s+=8; else if(o.official_status==='licensed'||o.official_status==='verified') s+=5;
  if(o.license_required && /Pending/.test(o.status||'')) s-=22;
  if(o._conflict) s-=28;
  let score=Math.max(0,Math.min(100,s));
  if(o.human_review && score>69) score=Math.min(score,68); // force into human-review band when flagged
  return score;
}
function verificationTier(score){
  if(score>=95) return {k:'official',label:'Verified official',color:'green'};
  if(score>=85) return {k:'high',label:'Verified high confidence',color:'blue'};
  if(score>=70) return {k:'caution',label:'Verified with caution',color:'orange'};
  if(score>=50) return {k:'review',label:'Human review required',color:'red'};
  return {k:'rejected',label:'Rejected',color:'red'};
}
/* can this verification band auto-regenerate executive dashboards? */
function canAutoRegenerate(score, tier){ const vt=verificationTier(score).k; return (vt==='official'||vt==='high') && (tier===1||tier===2); }

/* ---- strict source acceptance ---- */
function validateCertifiedSource(source){
  if(typeof source==='string') source=certBySource(source)||{};
  const checks=[]; const add=(label,ok,detail)=>checks.push({label,ok,detail:detail||''});
  add('In approved Certified Source Registry', !!certBySource(source.id));
  add('Source tier permitted for automation', (source.tier||5)<=4, source.tier===5?'Tier 5 (open web) cannot trigger automatic decisions':'');
  add('Licence valid (if required)', !source.license_required || !/Pending license/.test(source.status||''), source.license_required?'Requires signed licence':'Not required');
  add('API key / token active (if required)', !source.api_key_required || !/Pending API key/.test(source.status||''), source.api_key_required?'Requires active credential':'Not required');
  add('Content usage permitted (no scraping)', source.scraping_allowed!==true);
  add('Classification compatible with your role', lvl()>=(CLASS_LVL[source.allowed_classification]||0), source.allowed_classification);
  add('Credibility above threshold (≥70%)', (source.credibility_score||0)>=0.7, pct(source.credibility_score||0));
  add('Freshness within window (≥50%)', (source.freshness_score||0)>=0.5, pct(source.freshness_score||0));
  add('No higher-authority conflict', !source._conflict);
  add('Human-review not blocking automation', !source.human_review || (source.tier||5)<=2, source.human_review?'Flagged for human review':'Clear');
  const ok=checks.every(c=>c.ok);
  const score=computeVerificationScore(source);
  return {ok, checks, score, band:verificationTier(score)};
}
function rejectUnverifiedSource(source, reason){
  const name=(source&&source.name)||source||'unknown source';
  const ref='AUD-'+Math.random().toString(36).slice(2,8).toUpperCase();
  if(typeof logAudit==='function') logAudit('Rejected unverified source', name+' — '+reason, 'OFFICIAL');
  logAutomationEvent({trigger:'system', action:'Source rejected', object:'CertifiedSource', source:name, result:'rejected', error:reason});
  const alt=CERTIFIED_SOURCES.find(s=>(s.tier===1||s.tier===2)&&!/Pending/.test(s.status));
  return { rejected:name, reason, requiredApproval:'Licensing agreement + security review', auditRef:ref, alternative: alt?alt.name:'An official UAE / international data API' };
}

    toast(tx('Update rejected — verification below threshold')); if(typeof pushAgentNotice==='function') pushAgentNotice('webhookFail'); if(S.route==='webhooks'||S.route==='certified') render(); return ev; }
  // Tier 3+ or human-review → human review queue (no auto Cabinet regeneration)
  if(band.k==='review'||band.k==='caution'||ev.requires_human_review){
    DanahIntelligenceEngine.humanApprovalQueue.unshift(ev);
    updateChangeLog(ev); createAlertFromSignal(ev);
    logAutomationEvent({trigger:'webhook', action:'Human review requested', source:cs.name, eventId:ev.event_id, object:internalType, conf:cred, humanReview:true, result:'awaiting approval'});

if(typeof LA==='object'){ LA.busy=false; LA.abortRequested=false; LA.unreadCount=0; LA.typingTimer=null; LA.lastResponseAt=0; }

/* source-aware answers (provenance / trust) */
function agentSourceAnswer(query){
  const q=(query||'').toLowerCase(); if(!/source|where did|come from|can i trust|trust this|certif|provenance|credib/.test(q)) return null;
  // pick a representative high-authority certified source to explain the chain
  const cs=CERTIFIED_SOURCES.find(s=>s.tier===1&&!/Pending/.test(s.status))||CERTIFIED_SOURCES[0];
  const score=computeVerificationScore(cs); const band=verificationTier(score);
  const certified = !!certBySource(cs.id);
  const text = tx('Here is the evidence chain for the latest verified items:')+'\n'+
    '• '+tx('Source')+': '+tx(cs.name)+' ('+tx(cs.provider)+')\n'+
    '• '+tx('Tier')+': '+tx(SOURCE_TIERS[cs.tier].short)+' — '+tx(SOURCE_TIERS[cs.tier].auth)+'\n'+
    '• '+tx('Licence / status')+': '+tx(cs.status)+'\n'+
    '• '+tx('Freshness')+': '+pct(cs.freshness_score)+' · '+tx('Credibility')+': '+pct(cs.credibility_score)+'\n'+
    '• '+tx('Verification')+': '+score+'/100 — '+tx(band.label)+'\n'+
    '• '+tx('Human review')+': '+(cs.human_review?tx('required'):tx('not required'))+'\n'+
    '• '+tx('Status')+': '+(certified?tx('certified — appears in the Certified Source Registry'):tx('not certified — contextual only'))+'.\n\n'+
    (/can i trust|trust this/.test(q)
      ? tx('Trust depends on cross-verification: Tier 1/2 official sources can auto-update executive views; Tier 3 licensed news needs Tier 1/2 corroboration or human review before Cabinet decisions; Tier 5 open web is never treated as verified evidence.')
      : tx('I only call a source “certified” when it appears in the Certified Source Registry.'));
  return { text, actions:[{id:'go:certified',label:tx('Open Certified Source Registry')},{id:'go:webhooks',label:tx('Source verification')}] };
}

/* =============================================================== INIT ==== */
(function boot(){
  const saved=STORE.load();
  if(saved){
    ['theme','lang','ministry','role'].forEach(k=>{if(saved[k]!=null)S[k]=saved[k];});
    ['motion','classify','audit'].forEach(k=>{if(typeof saved[k]==='boolean')S[k]=saved[k];});
    if(typeof saved.tourSeen==='boolean') S.tourSeen=saved.tourSeen;
    if(saved.session && typeof saved.session==='object') SESSION=saved.session;
    if(saved.pat && typeof saved.pat==='object'){ S.pat=Object.assign(S.pat, saved.pat); if(!S.pat.ministriesOpened)S.pat.ministriesOpened={}; }
    if(!roleObj()) S.role='cabinethead';
    if(Array.isArray(saved.decisions)){ for(let i=DECISIONS.length-1;i>=0;i--){ if(!saved.decisions.includes(DECISIONS[i].id)) DECISIONS.splice(i,1); } }
    if(Array.isArray(saved.actions)&&saved.actions.length){ ACTIONS.length=0; saved.actions.forEach(a=>ACTIONS.push(a)); }
    if(Array.isArray(saved.audited)&&saved.audited.length){ AUDIT.length=0; saved.audited.forEach(a=>AUDIT.push(a)); }
    if(Array.isArray(saved.changes)&&saved.changes.length){ /* keep curated + restored */ saved.changes.forEach(c=>{ if(!CHANGES.find(x=>x.text===c.text)) CHANGES.unshift(c); }); }
  }
  // keep the signed-in rank consistent with the verified session
  if(SESSION&&SESSION.rank&&ROLES.find(r=>r.id===SESSION.rank)) S.role=SESSION.rank;
  sealAuditSeed();
  applyEnv();
  renderSidebar(); renderHeader(); render();
  renderProtoBadge();
  startCircuit(); /* 24-Hour Agentic Intelligence Circuit — simulated; production hook: scheduled server-side jobs */
  if(typeof startIntelligenceEngine==='function') startIntelligenceEngine(); /* v8 always-on engine (simulated) */
  if(typeof detectChangesSinceLastRefresh==='function') detectChangesSinceLastRefresh();
  if(typeof renderLiveAgent==='function') renderLiveAgent(); /* v8 persistent Live Agent */
  requireAuth(); /* gate the app behind the simulated sign-in */
})();

/* global keyboard: ⌘K / Ctrl-K palette, "/" focus ask, Esc closes overlays */
document.addEventListener('keydown',e=>{
  const mod=e.metaKey||e.ctrlKey;
  if(mod && (e.key==='k'||e.key==='K')){ e.preventDefault(); PAL.open?closePalette():openPalette(); return; }
  if(e.key==='Escape'){ if(PAL.open){closePalette();return;} closeModal(); }
  if(e.key==='/' && !/INPUT|TEXTAREA|SELECT/.test((e.target.tagName||'')) && !PAL.open){
    const a=document.getElementById('askInput'); if(a){e.preventDefault();a.focus();} }
});
